<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flappy Bird Clone</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <main class="game-wrap">
        <h1>Flappy Bird Clone</h1>
        <div class="hud" aria-live="polite">
            <span>Score: <strong id="score">0</strong></span>
            <span>Best: <strong id="best">0</strong></span>
        </div>
        <div class="controls">
            <div class="difficulty" role="group" aria-label="Difficulty">
                <button class="difficulty-btn" data-difficulty="easy" type="button">Easy</button>
                <button class="difficulty-btn is-active" data-difficulty="normal" type="button">Normal</button>
                <button class="difficulty-btn" data-difficulty="hard" type="button">Hard</button>
            </div>
            <div class="actions">
                <button id="pauseBtn" class="action-btn" type="button">Pause (P)</button>
                <button id="soundBtn" class="action-btn" type="button" aria-pressed="true">Sound: On</button>
            </div>
        </div>
        <canvas
            id="gameCanvas"
            width="420"
            height="640"
            role="img"
            aria-label="Flappy bird style game"
        ></canvas>
        <p class="hint">Click, tap, or press Space / ArrowUp to flap. Press P to pause.</p>
    </main>
    <script src="script.js"></script>
</body>
</html>
